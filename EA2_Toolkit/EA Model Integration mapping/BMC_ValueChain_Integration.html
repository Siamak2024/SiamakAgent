<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMC ↔ Value Chain Integration</title>
<script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.rotate-180 { transform: rotate(180deg); }
.scale-105 { transform: scale(1.05); }
.-translate-y-1 { transform: translateY(-4px); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const bmcNodes = [
  { id: 'kp', label: 'Nyckelpartners', icon: '🤝', mapsTo: ['proc', 'inbound'], desc: 'Styr Procurement och Inbound Logistics – vilka partners levererar vad?' },
  { id: 'ka', label: 'Nyckelaktiviteter', icon: '⚙️', mapsTo: ['infra', 'hr', 'tech', 'ops'], desc: 'Bryts ner i Support- & Primära aktiviteter i värdekedjan' },
  { id: 'kr', label: 'Nyckelresurser', icon: '🏗️', mapsTo: ['infra', 'tech'], desc: 'Infrastruktur och teknisk plattform i värdekedjan' },
  { id: 'vp', label: 'Värdeerbjudande', icon: '💎', mapsTo: ['ops', 'sales', 'service'], desc: 'Kärnan – levereras via Operations, Sales & Service' },
  { id: 'cr', label: 'Kundrelationer', icon: '👥', mapsTo: ['sales', 'service'], desc: 'Direkt koppling till Sales & Service & Aftermarket' },
  { id: 'ch', label: 'Kanaler', icon: '📡', mapsTo: ['outbound', 'sales'], desc: 'Distribution och marknadskommunikation' },
  { id: 'cs', label: 'Kundsegment', icon: '🎯', mapsTo: ['sales'], desc: 'Målgrupp styr Sales & Marketing-strategin' },
  { id: 'cost', label: 'Kostnadsstruktur', icon: '🧾', mapsTo: ['margin'], desc: 'Direkt påverkan på Marginal-analysen' },
  { id: 'rev', label: 'Intäktsströmmar', icon: '💰', mapsTo: ['margin'], desc: 'Intäktssidan av Marginal-analysen' },
];

const vcNodes = [
  { id: 'infra', label: 'Infrastructure', type: 'support' },
  { id: 'hr', label: 'HR Management', type: 'support' },
  { id: 'tech', label: 'Tech Development', type: 'support' },
  { id: 'proc', label: 'Procurement', type: 'support' },
  { id: 'inbound', label: 'Inbound Logistics', type: 'primary' },
  { id: 'ops', label: 'Operations', type: 'primary' },
  { id: 'outbound', label: 'Outbound Logistics', type: 'primary' },
  { id: 'sales', label: 'Sales & Marketing', type: 'primary' },
  { id: 'service', label: 'Service & Aftermarket', type: 'primary' },
  { id: 'margin', label: 'MARGIN', type: 'margin' },
];

const outcomes = [
  { icon: '🛡️', title: 'Riskreduktion', text: 'Identifiera glapp mellan affärsmodellens löften och värdekedjans faktiska leveransförmåga.', bg: '#eff6ff', border: '#93c5fd', iconBg: '#dbeafe', textColor: '#1d4ed8' },
  { icon: '💸', title: 'Kostnadsbesparing', text: 'Mappa BMC:s kostnadsstruktur direkt till "Value Destroyers" i värdekedjan för riktad automation.', bg: '#f0fdf4', border: '#6ee7b7', iconBg: '#d1fae5', textColor: '#065f46' },
  { icon: '🚀', title: 'Innovation', text: 'Hitta nya intäktsströmmar (BMC) via optimerad Tech Development och AI-driven analys (VC).', bg: '#fff7ed', border: '#fdba74', iconBg: '#ffedd5', textColor: '#c2410c' },
];

const tabs = ['Integrationsflöde', 'Mappningsmatris', 'Data Schema'];

const flowSteps = [
  { step: 1, from: 'BMC: Värdeerbjudande', to: 'VC: Operations + Service', icon: '💎→⚙️', detail: 'Det du lovar kunden i BMC bryts ner i hur det faktiskt levereras via Operations och Service & Aftermarket i Value Chain.', outcome: 'Säkerställer att löftet är operativt möjligt – minskar leveransrisk.' },
  { step: 2, from: 'BMC: Nyckelaktiviteter', to: 'VC: Support + Primary Activities', icon: '⚙️→🏗️', detail: 'Aktiviteterna i BMC mappar till antingen Support Activities (Tech, HR, Infra) eller Primary Activities (Ops, Logistics).', outcome: 'Ger en komplett operativ bild – identifierar saknade aktiviteter.' },
  { step: 3, from: 'BMC: Kostnadsstruktur', to: 'VC: Marginalanalys', icon: '🧾→📊', detail: 'Kostnadsposterna i BMC ger direkt indata till var marginalen pressas i Value Chain-analysatorn.', outcome: 'Möjliggör riktad kostnadsoptimering och automation.' },
  { step: 4, from: 'BMC: Nyckelpartners', to: 'VC: Procurement + Inbound', icon: '🤝→📦', detail: 'Dina partners i BMC definierar hur effektiv din Inbound Logistics och Procurement är i värdekedjan.', outcome: 'Optimerar leverantörskedjan och minskar beroenderisk.' },
  { step: 5, from: 'BMC: Kundsegment', to: 'VC: Sales & Marketing', icon: '🎯→📣', detail: 'Vem du riktar dig till i BMC styr hur Sales & Marketing-boxen ska optimeras för AI-driven personalisering.', outcome: 'Ökad tenant retention och lägre vakansgrad.' },
  { step: 6, from: 'BMC CSV Export', to: 'VC: AI-analys input', icon: '📄→🤖', detail: 'BMC exporterar CSV med alla 12 fält. Value Chain-analysatorn kan importera dessa som kontext för sin AI-analys.', outcome: 'Kombinerad AI-insikt – strategisk roadmap med operativ förankring.' },
];

const schemaFields = {
  bmc: ['key_partners', 'key_activities', 'key_resources', 'customer_relationships', 'channels', 'customer_segments', 'value_proposition', 'revenue_streams', 'cost_structure', 'goal', 'driver', 'regulatory'],
  vc: ['activity_name', 'activity_type', 'value_score', 'cost_score', 'digitalization_potential', 'ai_opportunity', 'notes'],
};

function App() {
  const [activeTab, setActiveTab] = useState(0);
  const [activeNode, setActiveNode] = useState(null);
  const [expandedStep, setExpandedStep] = useState(null);

  const isHighlighted = (id) => {
    if (!activeNode) return false;
    const node = bmcNodes.find(n => n.id === activeNode);
    return node && node.mapsTo.includes(id);
  };

  const supportNodes = vcNodes.filter(n => n.type === 'support');
  const primaryNodes = vcNodes.filter(n => n.type === 'primary');
  const marginNode = vcNodes.find(n => n.type === 'margin');

  return (
    <div style={{minHeight:'100vh', background:'#f8fafc', fontFamily:'-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'}}>

      {/* Header */}
      <div style={{background:'linear-gradient(135deg, #0f172a, #1e3a8a)', color:'#fff', padding:'24px 32px'}}>
        <div style={{maxWidth:960, margin:'0 auto'}}>
          <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:4}}>
            <span style={{fontSize:26}}>🔗</span>
            <h1 style={{margin:0, fontSize:22, fontWeight:800, letterSpacing:'-0.5px'}}>BMC ↔ Value Chain Analyzer</h1>
            <span style={{background:'#3b82f6', color:'#fff', fontSize:10, fontWeight:700, padding:'2px 10px', borderRadius:20}}>EA 2.0</span>
          </div>
          <p style={{color:'#93c5fd', fontSize:13, margin:0}}>Integrationsarkitektur · Från affärsmodell till operativ värdekedja</p>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:'#fff', borderBottom:'1px solid #e2e8f0', padding:'0 32px'}}>
        <div style={{maxWidth:960, margin:'0 auto', display:'flex', gap:4}}>
          {tabs.map((tab, i) => (
            <button key={i} onClick={() => setActiveTab(i)} style={{padding:'12px 20px', fontSize:13, fontWeight:600, border:'none', background:'transparent', cursor:'pointer', borderBottom: activeTab===i ? '2px solid #2563eb' : '2px solid transparent', color: activeTab===i ? '#1d4ed8' : '#64748b', transition:'all 0.2s'}}>
              {tab}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:960, margin:'0 auto', padding:'32px'}}>

        {/* TAB 0: Integrationsflöde */}
        {activeTab === 0 && (
          <div>
            <p style={{color:'#64748b', fontSize:13, marginBottom:24}}>Klicka på ett steg för att expandera detaljer och affärsnytta.</p>
            <div style={{display:'flex', flexDirection:'column', gap:10}}>
              {flowSteps.map(s => (
                <div key={s.step} onClick={() => setExpandedStep(expandedStep === s.step ? null : s.step)}
                  style={{borderRadius:14, border: expandedStep===s.step ? '2px solid #3b82f6' : '2px solid #e2e8f0', background: expandedStep===s.step ? '#eff6ff' : '#fff', cursor:'pointer', transition:'all 0.2s', boxShadow: expandedStep===s.step ? '0 4px 16px rgba(59,130,246,0.15)' : 'none'}}>
                  <div style={{display:'flex', alignItems:'center', gap:14, padding:'14px 18px'}}>
                    <div style={{width:32, height:32, borderRadius:'50%', background:'#2563eb', color:'#fff', fontSize:13, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>{s.step}</div>
                    <div style={{fontSize:18}}>{s.icon}</div>
                    <div style={{flex:1}}>
                      <span style={{fontWeight:600, color:'#1e293b', fontSize:13}}>{s.from}</span>
                      <span style={{color:'#94a3b8', margin:'0 8px'}}>→</span>
                      <span style={{fontWeight:600, color:'#059669', fontSize:13}}>{s.to}</span>
                    </div>
                    <span style={{color:'#94a3b8', fontSize:12, transition:'transform 0.2s', display:'inline-block', transform: expandedStep===s.step ? 'rotate(180deg)' : 'none'}}>▼</span>
                  </div>
                  {expandedStep === s.step && (
                    <div style={{padding:'0 18px 18px', borderTop:'1px solid #bfdbfe'}}>
                      <p style={{fontSize:13, color:'#334155', margin:'12px 0 10px'}}>{s.detail}</p>
                      <div style={{background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:10, padding:'10px 14px', display:'flex', gap:8, alignItems:'flex-start'}}>
                        <span style={{fontSize:11, fontWeight:700, color:'#059669', marginTop:1, flexShrink:0}}>AFFÄRSNYTTA</span>
                        <p style={{fontSize:12, color:'#065f46', margin:0}}>{s.outcome}</p>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TAB 1: Mappningsmatris */}
        {activeTab === 1 && (
          <div>
            <p style={{color:'#64748b', fontSize:13, marginBottom:24}}>Hovra över en BMC-komponent för att se vilka Value Chain-aktiviteter den mappar till.</p>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:40, alignItems:'start'}}>

              {/* BMC */}
              <div>
                <h2 style={{fontSize:14, fontWeight:700, color:'#1d4ed8', marginBottom:16}}>📋 Business Model Canvas</h2>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
                  {bmcNodes.map(node => (
                    <div key={node.id}
                      onMouseEnter={() => setActiveNode(node.id)}
                      onMouseLeave={() => setActiveNode(null)}
                      style={{padding:12, borderRadius:12, border: activeNode===node.id ? '2px solid #3b82f6' : '2px solid #e2e8f0', background: activeNode===node.id ? '#eff6ff' : '#fff', cursor:'help', transition:'all 0.2s', transform: activeNode===node.id ? 'scale(1.04)' : 'none', boxShadow: activeNode===node.id ? '0 4px 12px rgba(59,130,246,0.2)' : 'none'}}>
                      <div style={{fontSize:18, marginBottom:4}}>{node.icon}</div>
                      <div style={{fontWeight:600, color:'#1e293b', fontSize:12}}>{node.label}</div>
                      {activeNode === node.id && <div style={{color:'#2563eb', fontSize:11, marginTop:4, lineHeight:1.4}}>{node.desc}</div>}
                    </div>
                  ))}
                </div>
              </div>

              {/* Value Chain */}
              <div>
                <h2 style={{fontSize:14, fontWeight:700, color:'#059669', marginBottom:16}}>🔗 Value Chain Analyzer</h2>
                <div style={{border:'2px solid #e2e8f0', borderRadius:16, padding:16, background:'#fff', boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                  <div style={{fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:1, marginBottom:8}}>Support Activities</div>
                  <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, marginBottom:16}}>
                    {supportNodes.map(node => (
                      <div key={node.id} style={{padding:'8px 10px', borderRadius:8, border:'1px solid', textAlign:'center', fontSize:11, fontWeight:600, transition:'all 0.3s', background: isHighlighted(node.id) ? '#10b981' : '#f8fafc', color: isHighlighted(node.id) ? '#fff' : '#64748b', borderColor: isHighlighted(node.id) ? '#059669' : '#e2e8f0', transform: isHighlighted(node.id) ? 'scale(1.04)' : 'none', boxShadow: isHighlighted(node.id) ? '0 2px 8px rgba(16,185,129,0.3)' : 'none'}}>
                        {node.label}
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:1, marginBottom:8}}>Primary Activities</div>
                  <div style={{display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:4, marginBottom:10}}>
                    {primaryNodes.map(node => (
                      <div key={node.id} style={{padding:'8px 4px', borderRadius:8, border:'1px solid', textAlign:'center', fontSize:'9px', fontWeight:700, minHeight:60, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.3s', background: isHighlighted(node.id) ? '#10b981' : '#f1f5f9', color: isHighlighted(node.id) ? '#fff' : '#64748b', borderColor: isHighlighted(node.id) ? '#059669' : '#e2e8f0', transform: isHighlighted(node.id) ? 'translateY(-3px)' : 'none'}}>
                        {node.label}
                      </div>
                    ))}
                  </div>
                  <div style={{padding:12, borderRadius:12, border:'2px solid', textAlign:'center', fontWeight:900, fontSize:13, letterSpacing:3, transition:'all 0.5s', background: isHighlighted('margin') ? '#f97316' : '#1e293b', color: isHighlighted('margin') ? '#fff' : '#475569', borderColor: isHighlighted('margin') ? '#ea580c' : '#0f172a', transform: isHighlighted('margin') ? 'scale(1.04)' : 'none'}}>
                    {marginNode.label}
                  </div>
                </div>
              </div>
            </div>

            {/* Outcomes */}
            <div style={{marginTop:40, display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16}}>
              {outcomes.map((o, i) => (
                <div key={i} style={{padding:20, borderRadius:16, border:`1px solid ${o.border}`, background:o.bg}}>
                  <div style={{width:36, height:36, background:o.iconBg, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, marginBottom:12}}>{o.icon}</div>
                  <h3 style={{fontSize:13, fontWeight:700, color:o.textColor, margin:'0 0 6px'}}>{o.title}</h3>
                  <p style={{fontSize:12, color:'#475569', margin:0, lineHeight:1.6}}>{o.text}</p>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TAB 2: Data Schema */}
        {activeTab === 2 && (
          <div>
            <p style={{color:'#64748b', fontSize:13, marginBottom:24}}>CSV-strukturer och tekniska synergier mellan de två verktygen.</p>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:24}}>
              <div style={{background:'#fff', border:'1px solid #e2e8f0', borderRadius:14, padding:20, boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                <h3 style={{fontSize:13, fontWeight:700, color:'#1d4ed8', marginBottom:14}}>📋 BMC CSV Export</h3>
                <div style={{display:'flex', flexDirection:'column', gap:5}}>
                  {schemaFields.bmc.map((f, i) => (
                    <div key={i} style={{display:'flex', alignItems:'center', gap:8, fontSize:12}}>
                      <span style={{width:18, height:18, background:'#dbeafe', color:'#1d4ed8', borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:700, flexShrink:0}}>{i+1}</span>
                      <code style={{background:'#f1f5f9', padding:'2px 8px', borderRadius:4, color:'#334155', fontSize:11}}>{f}</code>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{background:'#fff', border:'1px solid #e2e8f0', borderRadius:14, padding:20, boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                <h3 style={{fontSize:13, fontWeight:700, color:'#059669', marginBottom:14}}>🔗 Value Chain Data</h3>
                <div style={{display:'flex', flexDirection:'column', gap:5}}>
                  {schemaFields.vc.map((f, i) => (
                    <div key={i} style={{display:'flex', alignItems:'center', gap:8, fontSize:12}}>
                      <span style={{width:18, height:18, background:'#d1fae5', color:'#059669', borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:700, flexShrink:0}}>{i+1}</span>
                      <code style={{background:'#f1f5f9', padding:'2px 8px', borderRadius:4, color:'#334155', fontSize:11}}>{f}</code>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div style={{background:'#fffbeb', border:'1px solid #fcd34d', borderRadius:14, padding:20, marginBottom:20}}>
              <h3 style={{fontSize:13, fontWeight:700, color:'#92400e', marginBottom:10}}>🔑 API-nyckel synkronisering</h3>
              <p style={{fontSize:12, color:'#78350f', marginBottom:10}}>BMC söker efter nycklar i följande ordning – samma som Value Chain Analyzer:</p>
              <div style={{display:'flex', flexWrap:'wrap', gap:8, marginBottom:12}}>
                {['ea20_openai_key','vc_openai_key','cap_openai_key','strategy_openai_key','openai_api_key'].map(k => (
                  <code key={k} style={{background:'#fef3c7', color:'#92400e', padding:'4px 10px', borderRadius:6, fontSize:11, fontFamily:'monospace'}}>{k}</code>
                ))}
              </div>
              <div style={{background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:8, padding:10}}>
                <p style={{fontSize:12, color:'#065f46', margin:0}}><strong>✅ Fullt synkroniserat:</strong> BMC sparar API-nyckeln i <em>alla</em> localStorage-nycklar samtidigt. En nyckel aktiverar AI-analysen i hela EA 2.0-sviten.</p>
              </div>
            </div>

            <div style={{background:'#0f172a', color:'#fff', borderRadius:14, padding:24}}>
              <h3 style={{fontWeight:700, marginBottom:14, fontSize:14}}>🗺️ Rekommenderat arbetsflöde</h3>
              <ol style={{paddingLeft:20, margin:0, display:'flex', flexDirection:'column', gap:10}}>
                {['Fyll i BMC → kör AI-analys → exportera CSV','Importera BMC CSV som kontext i Value Chain Analyzer','Identifiera Value Creators & Destroyers med BMC som referens','Exportera Value Chain-data → importera i Capability Mapping V2','Slutför i EA 2.0 Platform med full ROI-kalkyl och board report'].map((s,i) => (
                  <li key={i} style={{fontSize:13, color:'#cbd5e1'}}><span style={{color:'#60a5fa', fontWeight:700}}></span>{s}</li>
                ))}
              </ol>
            </div>
          </div>
        )}
      </div>

      <footer style={{textAlign:'center', color:'#94a3b8', fontSize:11, padding:'20px', borderTop:'1px solid #e2e8f0'}}>
        EA 2.0 Suite · BMC ↔ Value Chain Integration Architecture · PropTech & Real Estate
      </footer>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
